<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicFlow AI - Book Your Appointment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="booking-body">
    <main class="booking-container">
        <header class="booking-header">
            <div class="booking-header-badge">
                <svg class="booking-header-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 12h3.75M6 15h3.75M6 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25z" />
                </svg>
                <span>ClinicFlow AI</span>
            </div>
            <h1 class="booking-title">Book your appointment now</h1>
            <p class="booking-subtitle" id="booking-header-sub">So our team can reach out to you on time</p>
        </header>

        <form id="booking-form" class="booking-form" novalidate onsubmit="return false;">
            <input type="hidden" id="clinic_id" name="clinic_id" value="" aria-hidden="true">
            <div id="form-message" class="booking-message" role="alert" aria-live="polite" hidden></div>
            <div class="booking-grid">
                <div class="booking-field">
                    <label for="patient_name" class="booking-label">Full Name <span class="booking-required">*</span></label>
                    <input
                        type="text"
                        id="patient_name"
                        name="patient_name"
                        class="booking-input"
                        placeholder="eg: John Doe"
                        required
                        maxlength="120"
                        autocomplete="name"
                    >
                    <span class="booking-error" id="error-name" aria-live="polite"></span>
                </div>

                <div class="booking-field">
                    <label for="preferred_date" class="booking-label">Available Date <span class="booking-required">*</span></label>
                    <input
                        type="date"
                        id="preferred_date"
                        name="preferred_date"
                        class="booking-input"
                        required
                    >
                    <span class="booking-error" id="error-date" aria-live="polite"></span>
                </div>

                <div class="booking-field">
                    <label for="doctor_name" class="booking-label">Preferred Doctor <span class="booking-required">*</span></label>
                    <select
                        id="doctor_name"
                        name="doctor_name"
                        class="booking-input"
                        required
                        aria-required="true"
                    >
                        <option value="">Select a doctor</option>
                    </select>
                    <span class="booking-error" id="error-doctor" aria-live="polite"></span>
                </div>

                <div class="booking-field booking-field--full">
                    <label for="phone" class="booking-label">Phone Number <span class="booking-required">*</span></label>
                    <div class="booking-phone-wrap">
                        <select id="phone_country_code" name="phone_country_code" class="booking-input booking-phone-code" aria-label="Country code">
                            <option value="+1">+1</option>
                            <option value="+44">+44</option>
                            <option value="+91">+91</option>
                            <option value="+971" selected>+971</option>
                            <option value="+61">+61</option>
                            <option value="+49">+49</option>
                            <option value="+33">+33</option>
                            <option value="+81">+81</option>
                            <option value="+86">+86</option>
                            <option value="+55">+55</option>
                        </select>
                        <input
                            type="tel"
                            id="phone"
                            name="phone"
                            class="booking-input booking-phone-number"
                            placeholder="543210987"
                            required
                            autocomplete="tel-national"
                        >
                    </div>
                    <span class="booking-error" id="error-phone" aria-live="polite"></span>
                </div>

                <div class="booking-field booking-field--full">
                    <label for="preferred_time" class="booking-label">Preferred Time <span class="booking-required">*</span></label>
                    <select
                        id="preferred_time"
                        name="preferred_time"
                        class="booking-input"
                        required
                        aria-describedby="slot-help"
                    >
                        <option value="">Select a date first</option>
                    </select>
                    <span class="booking-help" id="slot-help">Times are in 15-minute slots within clinic hours.</span>
                    <span class="booking-error" id="error-time" aria-live="polite"></span>
                </div>

                <div class="booking-field booking-field--full">
                    <label for="notes" class="booking-label">Share Your Message</label>
                    <textarea
                        id="notes"
                        name="notes"
                        class="booking-input booking-textarea"
                        placeholder="Message"
                        rows="4"
                    ></textarea>
                </div>
            </div>

            <div class="booking-actions">
                <button type="button" id="submit-btn" class="booking-btn">
                    <span class="booking-btn-text">Book Now</span>
                    <span class="booking-btn-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                        </svg>
                    </span>
                    <span class="booking-btn-loading" hidden>
                        <svg class="booking-spinner" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Submitting...
                    </span>
                </button>
            </div>
        </form>

        <div id="success-overlay" class="booking-success-overlay" hidden>
            <div class="booking-success-card">
                <div class="booking-success-icon-wrap">
                    <div class="booking-success-check">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
                        </svg>
                    </div>
                </div>
                <h2 class="booking-success-title">Appointment Booked Successfully!</h2>
                <p class="booking-success-message">Your appointment has been booked successfully. The clinic will confirm your appointment shortly. Thank you!</p>
                <button type="button" id="success-done-btn" class="booking-success-btn">Done</button>
            </div>
        </div>
    </main>

    <div id="toast-container" class="toast-container" aria-live="polite"></div>

    <script src="js/form.js"></script>
</body>
</html>
